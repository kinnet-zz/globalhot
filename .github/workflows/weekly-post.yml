name: 주간 화제 TOP10 자동 포스트

on:
  schedule:
    - cron: '0 0 * * 5'   # 매주 금요일 오전 9시 KST (UTC 0시)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 주간 포스트 생성
        run: node scripts/generate-weekly-post.mjs

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "GlobalHot Bot"
          git config user.email "bot@globalhot.pages.dev"
          git add posts/
          git diff --staged --quiet || git commit -m "post: 주간 화제 TOP10 - $(date '+%Y-%m-%d')"
          git push
