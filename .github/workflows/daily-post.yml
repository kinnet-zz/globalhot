name: 일일 글로벌 뉴스 AI 리포트 자동 발행

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 KST (UTC 0시)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 일일 포스트 생성
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://globalhot.pages.dev' }}
        run: |
          echo "⏳ CF Pages 배포 대기 중 (120초)..."
          sleep 120
          node scripts/generate-daily-post.mjs

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "GlobalHot Bot"
          git config user.email "bot@globalhot.pages.dev"
          git add posts/ sitemap.xml
          git diff --staged --quiet || git commit -m "post: daily report $(date '+%Y-%m-%d')"
          git push
