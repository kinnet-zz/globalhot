name: 일일 글로벌 뉴스 AI 리포트 자동 발행

on:
  schedule:
    - cron: '30 9 * * *'  # 매일 오후 6시 30분 KST (UTC 9:30 — Gemini 쿼터 리셋 후)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 일일 포스트 생성
        env:
          SITE_URL:       ${{ vars.SITE_URL || 'https://globalhot.net' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-daily-post.mjs

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "GlobalHot Bot"
          git config user.email "bot@globalhot.pages.dev"
          git add posts/ sitemap.xml index.html
          git diff --staged --quiet || git commit -m "post: daily report $(date '+%Y-%m-%d')"
          git push

      - name: Cloudflare Pages 배포
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: bdb1cf8e4920671e46565a911db9f40b
          command: pages deploy . --project-name globalhot --branch master
