<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="미국·일본·글로벌 커뮤니티 실시간 인기글 모음. Reddit, Hacker News, はてな, Wikipedia 트렌딩을 한 페이지에서." />
  <meta name="keywords" content="글로벌 트렌딩, 커뮤니티 인기글, 해외 커뮤니티, Hacker News, Reddit, はてな, 실시간 뉴스" />
  <meta property="og:title" content="GlobalHot – 실시간 글로벌 트렌딩" />
  <meta property="og:description" content="미국·일본·글로벌 커뮤니티 인기글을 한 곳에서. 지금 세계에서 무엇이 화제인지 확인하세요." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://globalhot.pages.dev/" />
  <meta name="robots" content="index, follow" />
  <title>GlobalHot – 실시간 글로벌 트렌딩</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google AdSense: 승인 후 아래 주석을 실제 코드로 교체하세요 -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script> -->
</head>
<body>

  <!-- ───── HEADER ───── -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">
        <span class="logo-globe">🌐</span>
        <span class="logo-text">GlobalHot</span>
        <span class="logo-badge">BETA</span>
      </a>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="searchInput" class="search-input" type="text" placeholder="글 제목 검색..." autocomplete="off" />
      </div>
      <div class="header-actions">
        <select id="langSelect" class="lang-select">
          <option value="all">🌐 Language</option>
          <option value="ko">🇰🇷 한국어</option>
          <option value="en">🇺🇸 English</option>
          <option value="ja">🇯🇵 日本語</option>
          <option value="zh">🇨🇳 中文</option>
        </select>
<button id="refreshBtn" class="icon-btn" title="새로고침">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        </button>
        <button id="themeBtn" class="icon-btn" title="테마 전환">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ───── TABS ───── -->
  <div class="tabs-bar">
    <div class="tabs-inner">
      <div class="tabs">
        <button class="tab active" data-tab="all" data-tip="전체"><span class="tab-emoji">🌐</span><span class="tab-label"> 전체</span></button>
        <button class="tab" data-tab="hot" data-tip="전세계화제"><span class="tab-emoji">🔥</span><span class="tab-label"> 전세계화제</span></button>
        <button class="tab" data-tab="tech" data-tip="테크·개발"><span class="tab-emoji">💻</span><span class="tab-label"> 테크·개발</span></button>
        <button class="tab" data-tab="world" data-tip="세계이슈"><span class="tab-emoji">🌍</span><span class="tab-label"> 세계이슈</span></button>
        <button class="tab" data-tab="trends" data-tip="검색트렌드"><span class="tab-emoji">🔍</span><span class="tab-label"> 검색트렌드</span></button>
        <button class="tab" data-tab="video" data-tip="핫영상"><span class="tab-emoji">🎬</span><span class="tab-label"> 핫영상</span></button>
        <button class="tab" data-tab="photo" data-tip="포토"><span class="tab-emoji">📸</span><span class="tab-label"> 포토</span></button>
      </div>
      <div class="sort-wrap">
        <label class="sort-label">정렬</label>
        <select id="sortSelect" class="sort-select">
          <option value="trending">🔥 트렌딩</option>
          <option value="time">🕐 최신순</option>
          <option value="points">👍 인기순</option>
          <option value="comments">💬 댓글순</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ───── MAIN ───── -->
  <main class="main">
    <section class="feed-section">
      <div id="feed" class="feed"></div>
      <div id="loadMoreWrap" class="load-more-wrap hidden">
        <button id="loadMoreBtn" class="load-more-btn">더 보기 ↓</button>
      </div>
    </section>

    <aside class="sidebar">
      <div class="sidebar-card wc-card">
        <h3 class="sidebar-title">☁️ 키워드 현황</h3>
        <div class="wc-wrap">
          <canvas id="wordCloud" width="260" height="260"></canvas>
          <div id="wcTooltip" class="wc-tooltip"></div>
        </div>
      </div>
      <div class="sidebar-card update-card">
        <span id="updateTime" class="update-time">—</span>
      </div>
    </aside>
  </main>


  <!-- ───── DETAIL PANEL ───── -->
  <div id="detailPanel" class="detail-panel" aria-hidden="true">
    <div class="detail-backdrop" id="detailBackdrop"></div>
    <div class="detail-sheet" role="dialog" aria-modal="true">
      <div class="detail-sheet-inner">
        <div class="detail-top-bar">
          <button class="detail-back-btn" id="detailBack">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            목록으로
          </button>
          <span id="detailBadge" class="detail-badge"></span>
        </div>
        <h1 id="detailTitle" class="detail-title"></h1>
        <div id="detailMeta" class="detail-meta"></div>
        <div id="detailSummary" class="detail-summary-box"></div>
        <a id="detailLink" class="detail-link-btn" target="_blank" rel="noopener noreferrer">
          🔗 원문 보기
        </a>
        <div id="detailComments" class="detail-comments"></div>
      </div>
    </div>
  </div>

  <script src="wordcloud2.min.js"></script>
  <script src="app.js"></script>

  <!-- ───── FOOTER ───── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="/about.html">서비스 소개</a>
        <a href="/privacy.html">개인정보처리방침</a>
        <a href="mailto:kintube0001@gmail.com">문의</a>
      </div>
      <p class="footer-copy">© 2026 GlobalHot · 본 서비스는 각 플랫폼의 공개 API를 활용하며, 콘텐츠 저작권은 원저작자에게 있습니다.</p>
    </div>
  </footer>
</body>
</html>
