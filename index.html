<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="미국·일본·글로벌 커뮤니티 실시간 인기글 모음. Reddit, Hacker News, はてな, Wikipedia 트렌딩을 한 페이지에서." />
  <meta name="keywords" content="글로벌 트렌딩, 커뮤니티 인기글, 해외 커뮤니티, Hacker News, Reddit, はてな, 실시간 뉴스" />
  <meta property="og:title" content="GlobalHot – 실시간 글로벌 트렌딩" />
  <meta property="og:description" content="미국·일본·글로벌 커뮤니티 인기글을 한 곳에서. 지금 세계에서 무엇이 화제인지 확인하세요." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://globalhot.pages.dev/" />
  <meta name="robots" content="index, follow" />
  <title>GlobalHot – 실시간 글로벌 트렌딩</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google AdSense: 승인 후 아래 주석을 실제 코드로 교체하세요 -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script> -->
</head>
<body>

  <!-- ───── HEADER ───── -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">
        <span class="logo-globe">🌐</span>
        <span class="logo-text">GlobalHot</span>
        <span class="logo-badge">BETA</span>
      </a>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="searchInput" class="search-input" type="text" placeholder="글 제목 검색..." autocomplete="off" />
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="icon-btn" title="새로고침">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        </button>
        <button id="themeBtn" class="icon-btn" title="테마 전환">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ───── TABS ───── -->
  <div class="tabs-bar">
    <div class="tabs">
      <button class="tab active" data-tab="all">🌐 전체</button>
      <button class="tab" data-tab="us">🇺🇸 미국</button>
      <button class="tab" data-tab="jp">🇯🇵 일본</button>
      <button class="tab" data-tab="tech">💻 IT/개발</button>
      <button class="tab" data-tab="world">🌍 세계뉴스</button>
    </div>
    <div class="sort-wrap">
      <label class="sort-label">정렬</label>
      <select id="sortSelect" class="sort-select">
        <option value="trending">🔥 트렌딩</option>
        <option value="time">🕐 최신순</option>
        <option value="points">👍 인기순</option>
        <option value="comments">💬 댓글순</option>
      </select>
    </div>
  </div>

  <!-- ───── MAIN ───── -->
  <main class="main">
    <section class="feed-section">
      <div id="feed" class="feed"></div>
      <div id="loadMoreWrap" class="load-more-wrap hidden">
        <button id="loadMoreBtn" class="load-more-btn">더 보기 ↓</button>
      </div>
    </section>

    <aside class="sidebar">
      <div class="sidebar-card">
        <h3 class="sidebar-title">🔥 지금 핫한 글 TOP 10</h3>
        <ol id="hotList" class="hot-list">
          <li class="skeleton-line"></li>
          <li class="skeleton-line"></li>
          <li class="skeleton-line"></li>
          <li class="skeleton-line"></li>
          <li class="skeleton-line"></li>
        </ol>
      </div>
      <div class="sidebar-card">
        <h3 class="sidebar-title">📡 소스 현황</h3>
        <ul id="sourceStatus" class="source-status-list"></ul>
      </div>
      <div class="sidebar-card update-card">
        <span id="updateTime" class="update-time">—</span>
      </div>
    </aside>
  </main>

  <!-- ───── PREVIEW PANEL ───── -->
  <div id="previewOverlay" class="preview-overlay hidden"></div>
  <aside id="previewPanel" class="preview-panel hidden">
    <div class="preview-header">
      <div class="preview-meta">
        <span id="previewBadge" class="source-badge"></span>
        <span id="previewTime" class="post-time"></span>
      </div>
      <button id="previewClose" class="preview-close" title="닫기">✕</button>
    </div>
    <div id="previewImg" class="preview-img"></div>
    <div class="preview-content">
      <h2 id="previewTitle" class="preview-title"></h2>
      <p id="previewDesc" class="preview-desc"></p>
      <div id="previewStats" class="preview-stats"></div>
    </div>
    <div class="preview-footer">
      <a id="previewLink" href="#" target="_blank" rel="noopener noreferrer" class="preview-link-btn">
        원문 보기 →
      </a>
    </div>
  </aside>

  <script src="app.js"></script>

  <!-- ───── FOOTER ───── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="/about.html">서비스 소개</a>
        <a href="/privacy.html">개인정보처리방침</a>
        <a href="mailto:kintube0001@gmail.com">문의</a>
      </div>
      <p class="footer-copy">© 2026 GlobalHot · 본 서비스는 각 플랫폼의 공개 API를 활용하며, 콘텐츠 저작권은 원저작자에게 있습니다.</p>
    </div>
  </footer>
</body>
</html>
